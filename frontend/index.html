<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chanakya | Compliance Orchestrator</title>
  </head>
  <body>
    <div id="app">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon"></div>
          Chanakya OS
        </div>
        <div class="nav-menu">
          <div class="nav-item active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Command Arena
          </div>
          <div class="nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Audit Ledgers
          </div>
          <div class="nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            Settings
          </div>
        </div>
      </aside>

      <!-- Main Central Arena -->
      <main class="main-arena">
        <div class="arena-header">
          <h1>Command Center</h1>
          <p>Submit strategic financial intents for autonomous orchestration.</p>
        </div>

        <div class="command-input-wrapper">
          <textarea id="promptInput" class="command-input" placeholder="e.g. 'We have a core income of ₹2.5Cr. Calculate tax, then allocate 20% to an Indian green energy fund.'"></textarea>
          <button id="submitBtn" class="command-submit">Execute</button>
        </div>

        <div class="pipeline-container" id="pipelineContainer">
          <!-- Dynamically populated by main.js -->
        </div>
      </main>

      <!-- Right Panel: Escrow Ledger -->
      <aside class="right-panel">
        <div class="panel-header">
          <span>Escrow Ledger</span>
          <div class="pulse-indicator"></div>
        </div>
        <div class="escrow-list" id="escrowList">
          <div class="empty-ledger">No active Escrow Locks. Pipeline is clean.</div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
